# Emotion Recognition (IEMOCAP) - NSCC cluster config
# Uses container paths via enroot mounts. Safe from git pull overwrites.
runner:
  total_steps: 30000
  gradient_clipping: 1
  gradient_accumulate_steps: 1

  log_step: 500
  eval_step: 1000
  save_step: 500
  max_keep: 1
  eval_dataloaders:
    - dev
    - test

optimizer:
  name: TorchOptim
  torch_optim_name: Adam
  lr: 1.0e-4

downstream_expert:
  datarc:
    root: /workspace/audio_data/IEMOCAP_full_release
    meta_data: ./downstream/emotion/meta_data
    test_fold: fold1
    pre_load: True
    train_batch_size: 32
    eval_batch_size: 4
    num_workers: 6
    valid_ratio: 0.2

  modelrc:
    projector_dim: 256
    select: UtteranceLevel

    UtteranceLevel:
      pooling: MeanPooling

    DeepModel:
      model_type: CNNSelfAttention
      hidden_dim: 80
      kernel_size: 5
      padding: 2
      pooling: 5
      dropout: 0.4
