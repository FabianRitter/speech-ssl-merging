# VocalSet Singer ID - NSCC cluster config
# Uses container paths via enroot mounts. Safe from git pull overwrites.
runner:
  total_steps: 80000
  gradient_clipping: 1
  gradient_accumulate_steps: 1

  log_step: 300
  eval_step: 300
  save_step: 300
  max_keep: 1
  eval_dataloaders:
    - dev
    - test

optimizer:
  name: TorchOptim
  torch_optim_name: Adam
  lr: 1.0e-3

downstream_expert:
  datarc:
    file_path: /workspace/s3prl/s3prl/data/vocalset_processed
    meta_data: ./downstream/vocalset_singer_id/data
    num_workers: 8
    train_batch_size: 64
    eval_batch_size: 1

  modelrc:
    projector_dim: 512
    select: UtteranceLevel
    UtteranceLevel:
      pooling: MeanPooling
