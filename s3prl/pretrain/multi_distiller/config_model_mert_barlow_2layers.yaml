multi_distiller:
  # Extractor
  extractor_mode: default
  extractor_conv_feature_layers: '[(512,10,5)] + [(512,3,2)] * 4 + [(512,2,2)] * 2'
  extractor_dropout: 0.0
  feature_grad_mult: 0.1

  # Convolutional relative positional encoding
  conv_pos: 128
  conv_pos_groups: 16

  # Transformer encoder - 2 layers (student)
  encoder_layers: 2
  encoder_embed_dim: 768
  encoder_ffn_embed_dim: 3072
  encoder_attention_heads: 12
  activation_fn: gelu
  layer_norm_first: false
  attention_type: original

  # Dropout
  dropout: 0.1
  attention_dropout: 0.1
  activation_dropout: 0.1
  encoder_layerdrop: 0.0

  # Output
  final_dim: 768
  out_layer_type: expand-last

  # Task & loss - Barlow Twins with cross and self correlation
  n_tasks: 3
  task_emb_type: expand-last
  loss_type: barlow
  loss_style: frame
  feat_pen_loss: 0.0
  cosine_loss: 1.0

  # Barlow Twins specific parameters
  barlow_scale: 1
  diagonal_scale: 10
  frame_level_barlow_scale: 100
  use_average_pooling: True
  average_pooling_value: 150
  self_correlation: True
  lambda_coefficient: 5e-4       # cross-correlation weight
  lambda_coeff_self_corr: 5e-4   # self-correlation weight
  off_diag_self_cor_scale: 100   # self-correlation off-diagonal scaling (consistent with HuBERT Barlow)

  # Predict from teacher layers 4, 8, 12
  pred_layer_id: [4, 8, 12]

  # Initialization
  init_teacher_conv_layers: true
  init_teacher_encoder_layers: true

  # Single teacher: MERT only
  teacher_names:
    - mert_v0_public

  # Initialize student weights from HuBERT
  initialize_from:
    - hubert_base

  use_feat_translator: False
  translator_type: avgpool
  translator_kwargs:
    hidden_size_factor: 1.0

teacher:
  models:
    - mert_v0_public
  n_layers: 12

task:
  sequence_length: 250000  # 15.6 secs

audio:
  target_level: ~
